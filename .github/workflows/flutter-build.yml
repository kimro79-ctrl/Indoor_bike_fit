name: BikeFit Final Victory - 100 Percent Certainty

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 및 Android 리셋
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 진짜 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # Base64 데이터가 깨지지 않도록 줄바꿈을 제거하고 복원합니다.
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      - name: 💉 Gradle 서명 설정 강제 주입 (성공 확률 100% 핵심)
        # Flutter 기본 템플릿의 build.gradle에 signingConfigs와 buildTypes 연결 로직을 강제로 삽입합니다.
        run: |
          cat <<EOF > inject_signing.py
          import os
          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()
          
          signing_logic = """
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          """
          # 'android {' 블록 바로 앞에 서명 로직을 삽입합니다.
          if 'signingConfigs' not in content:
              new_content = content.replace('android {', signing_logic + '\nandroid {')
              with open(path, 'w') as f:
                  f.write(new_content)
          EOF
          python3 inject_signing.py

      - name: 🏗 AAB 빌드 실행
        # --release 모드와 명시적 build-number로 이전 빌드와 차별화합니다.
        run: flutter build appbundle --release --no-tree-shake-icons --build-number=1050

      - name: 🔍 [최종 확인] SHA1 지문 대조
        run: |
          echo "=================================================="
          echo "구글 요구 지문: 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          echo -n "실제 빌드 지문: "
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1
          echo "=================================================="

      - name: 📦 진짜 AAB 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_100_AAB
          path: build/app/outputs/bundle/release/app-release.aab
