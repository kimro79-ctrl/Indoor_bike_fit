name: BikeFit FINAL STABLE BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 코드
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: ☕ Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🚀 Flutter
      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      # 💣 캐시 완전 제거 (latlong2 문제 차단)
      - name: 🧨 Delete Pub Cache
        run: rm -rf ~/.pub-cache

      # 🧹 클린
      - name: 🧹 Flutter Clean
        run: flutter clean

      # 📦 의존성 (핵심)
      - name: 📦 Pub Get
        run: flutter pub get

      # 🔍 검증 (디버깅용)
      - name: 🔍 Dependency Check
        run: flutter pub deps

      # 🔢 버전 코드
      - name: 🔢 Version Code
        run: echo "FINAL_VERSION_CODE=$((1706 + $GITHUB_RUN_NUMBER))" >> $GITHUB_ENV

      # 🔥 V2 강제 적용 (Android V1 완전 차단)
      - name: 🔥 Force V2 MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/overthebike/over_the_bike_fit
          cat <<EOF > android/app/src/main/kotlin/com/overthebike/over_the_bike_fit/MainActivity.kt
          package com.overthebike.over_the_bike_fit

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {}
          EOF

      # 🔑 Keystore
      - name: 🔑 Restore Keystore
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | base64 --decode > android/app/release.jks

          cat <<EOF > android/app/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      # 🏗️ 빌드
      - name: 🏗️ Build AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      # 📦 업로드
      - name: 📦 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_v${{ env.FINAL_VERSION_CODE }}_AAB
          path: build/app/outputs/bundle/release/app-release.aab
