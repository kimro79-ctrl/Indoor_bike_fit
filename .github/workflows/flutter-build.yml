name: BikeFit Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Restore release keystore
        run: |
          mkdir -p android/app
          # 시크릿 값을 파일로 저장 (개행 문자 처리를 위해 printf 사용)
          printf "%s" "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/release.jks

      - name: Verify keystore file
        run: |
          echo "Checking restored keystore file..."
          ls -la android/app/release.jks
          # 파일 크기 확인
          FILE_SIZE=$(stat -c%s android/app/release.jks)
          echo "File size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -le 0 ]; then
            echo "ERROR: release.jks is empty. Check your GitHub Secret 'RELEASE_KEYSTORE'."
            exit 1
          fi

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit-AAB
          path: build/app/outputs/bundle/release/app-release.aab
