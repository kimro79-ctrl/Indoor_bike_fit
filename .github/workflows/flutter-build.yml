name: BikeFit Final Victory - Perfect Syntax

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 진짜 Keystore 복원 (75:CD...)
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then exit 1; fi

      - name: 🔧 Gradle 서명 설정 정밀 주입 (블록 외부 삽입)
        # 💡 [핵심] plugins { ... } 블록이 닫히는 '}'를 찾은 후에 코드를 넣습니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF
          
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: lines = f.readlines()
          
          signing_code = '''
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          '''
          
          with open(path, 'w') as f:
              in_plugins = False
              inserted = False
              for line in lines:
                  f.write(line)
                  if 'plugins {' in line:
                      in_plugins = True
                  # plugins 블록이 닫히는 지점('}')을 찾으면 그 바로 뒤에 삽입
                  if in_plugins and '}' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
                      in_plugins = False
          "

      - name: 🚀 AAB 빌드 실행
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 확인] SHA1 지문 대조
        # 💡 여기서 75:CD...가 나오면 626번의 도전은 승리로 끝납니다.
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
