name: BikeFit Final Victory - Stable Signing

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🐦 Flutter 설정 (3.27.1)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗 안드로이드 프로젝트 재생성
        # 깨끗한 상태에서 시작하여 설정 충돌을 방지합니다.
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 2월 20일 진짜 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 줄바꿈과 공백을 제거하여 바이너리 무결성을 유지합니다.
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성 (경로 수정 완료)
        # 사용자님의 분석대로 storeFile 경로를 app/release.jks로 지정합니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=app/release.jks
          EOF

      - name: 🏗 AAB 빌드 실행
        # --release 옵션을 주면 Flutter는 자동으로 android/key.properties를 찾아 서명을 시도합니다.
        run: flutter build appbundle --release --no-tree-shake-icons --build-number=1200

      - name: 🔍 SHA1 지문 최종 검증
        run: |
          echo "=================================================="
          echo "구글 플레이 요구 지문: 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          echo -n "이번 빌드 결과 지문: "
          # 생성된 AAB의 내부 인증서를 직접 검사합니다.
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1
          echo "=================================================="

      - name: 📦 결과물 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
