name: Mobile Direct PEM Generator

on:
  workflow_dispatch:

jobs:
  generate-pem:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 새 키 및 PEM 파일 생성
        run: |
          # 구글 보안 정책 통과를 위해 완전히 새로운 키 생성
          keytool -genkey -v -keystore mobile-final.jks \
            -alias bikefit-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "password123" -keypass "password123" \
            -dname "CN=BikeFit, O=Dev, C=KR"

          # 구글 제출용 PEM 파일 추출
          keytool -export -rfc -keystore mobile-final.jks \
            -alias bikefit-key -file upload_certificate.pem -storepass "password123"

      - name: 📤 PEM 파일 바로 다운로드하게 만들기
        uses: actions/upload-artifact@v4
        with:
          name: upload_certificate.pem # 파일 이름 그대로 업로드
          path: upload_certificate.pem # 압축(zip)하지 않고 이 파일만 올림
          if-no-files-found: error

      - name: 🔍 비밀번호 정보 출력
        run: |
          echo "ALIAS: bikefit-key"
          echo "PASSWORD: password123"
