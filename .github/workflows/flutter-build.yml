name: BikeFit Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Restore release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/release.jks

      - name: Verify keystore file
        run: |
          echo "Checking keystore file..."
          ls -lh android/app
          if [ ! -s android/app/release.jks ]; then
            echo "ERROR: release.jks is empty"
            exit 1
          fi

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Print keystore SHA1
        run: |
          keytool -list -v \
          -keystore android/app/release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Verify AAB signature
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit-AAB
          path: build/app/outputs/bundle/release/app-release.aab
