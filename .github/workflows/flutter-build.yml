name: BikeFit PlayStore Release - Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        # 기존 설정과 충돌을 방지하기 위해 clean 후 다시 생성합니다.
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      # -----------------------------
      # 1️⃣ keystore 복원 (공백 제거 포함)
      # -----------------------------
      - name: 🔑 Restore Release Keystore
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 데이터 전송 시 섞일 수 있는 줄바꿈과 공백을 제거하고 복원합니다.
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      # -----------------------------
      # 2️⃣ key.properties 생성
      # -----------------------------
      - name: 🔧 Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      # -----------------------------
      # 3️⃣ build.gradle signing 설정 (Python 정밀 삽입)
      # -----------------------------
      - name: ⚙️ Configure Signing (Safe Injection)
        # plugins { } 블록을 건드리지 않고 그 다음에 안전하게 삽입합니다.
        run: |
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: lines = f.readlines()
          
          signing_code = \"\"\"
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          \"\"\"
          
          with open(path, 'w') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  # plugins 블록이 닫히는 첫 번째 '}'를 찾아 그 뒤에 코드를 넣습니다.
                  if '}' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
          "

      # -----------------------------
      # 4️⃣ keystore SHA1 확인
      # -----------------------------
      - name: 🔍 Verify Keystore SHA1
        run: |
          echo "현재 Keystore 지문 확인:"
          keytool -list -v \
            -keystore android/app/release.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -alias ${{ secrets.KEY_ALIAS }} | grep SHA1

      # -----------------------------
      # 5️⃣ AAB 빌드
      # -----------------------------
      - name: 🏗 Build AppBundle
        run: flutter build appbundle --release --no-tree-shake-icons

      # -----------------------------
      # 6️⃣ AAB 서명 확인
      # -----------------------------
      - name: 🔍 Verify AAB SHA1
        # 여기서 75:CD... 가 나오면 구글 업로드 성공입니다.
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      # -----------------------------
      # 7️⃣ 결과 업로드
      # -----------------------------
      - name: 📦 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
