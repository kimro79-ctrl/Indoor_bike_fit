name: BikeFit FINAL FIXED BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      # 🔥 중요: 캐시만 삭제 (android 유지)
      - name: 🧹 Clean
        run: |
          flutter clean
          flutter pub get

      # 🔥 V2 강제 (기존 덮어쓰기)
      - name: 🔥 Fix V2 Embedding
        run: |
          cat <<EOF > android/app/src/main/kotlin/com/overthebike/over_the_bike_fit/MainActivity.kt
          package com.overthebike.over_the_bike_fit

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      # 🔥 Manifest 보정
      - name: 📝 Fix Manifest
        run: |
          sed -i 's/android:name="io.flutter.app.FlutterApplication"//g' android/app/src/main/AndroidManifest.xml || true
          sed -i 's/android:name=".MainActivity"/android:name=".MainActivity"/g' android/app/src/main/AndroidManifest.xml || true

      # 🔑 keystore
      - name: 🔑 Restore Keystore
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | base64 --decode > android/app/release.jks

          cat <<EOF > android/app/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      # 🔥 gradle.properties 안정화
      - name: ⚙️ Fix Gradle Properties
        run: |
          cat <<EOF > android/gradle.properties
          org.gradle.jvmargs=-Xmx4g
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF

      # 🔥 핵심: build
      - name: 🏗 Build AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 📦 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_AAB
          path: build/app/outputs/bundle/release/app-release.aab
