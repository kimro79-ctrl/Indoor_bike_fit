name: BikeFit Final Ultra Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: 1️⃣ 환경 재생성 (Clean State)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 2️⃣ 키스토어 복원 및 데이터 검증
        run: |
          mkdir -p android/app
          
          # Secrets 값이 비어있는지 먼저 확인
          if [ -z "${{ secrets.RELEASE_KEYSTORE }}" ]; then
            echo "ERROR: GitHub Secret 'RELEASE_KEYSTORE' is EMPTY!"
            exit 1
          fi

          # base64 디코딩 후 파일 생성
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/release.jks
          
          # 파일 크기 재확인 (0바이트 방지)
          ls -la android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "ERROR: Decoded release.jks is 0 bytes. Check your base64 string!"
            exit 1
          fi

      - name: 3️⃣ 서명 정보 및 Gradle 주입
        run: |
          # key.properties 작성 (별칭: fresh-upload-key)
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

          # build.gradle 서명 로직 강제 주입
          cat <<EOF > android/app/build.gradle
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 34
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 34
                  versionCode 12  # 기존보다 높은 버전 코드 부여
                  versionName "1.2.0"
              }
          }
          flutter { source '../..' }
          EOF

      - name: 4️⃣ Build Release AAB
        run: |
          flutter clean
          flutter pub get
          flutter build appbundle --release --no-tree-shake-icons

      - name: 5️⃣ 최종 AAB 지문 확인 (SHA1 체크용)
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: Upload Artifact
