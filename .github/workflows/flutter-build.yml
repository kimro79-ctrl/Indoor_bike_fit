name: BikeFit Final Ultra Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Gradle 개조 없음)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 및 서명 정보 복원
        # 💡 Base64 줄바꿈 제거 및 파일 생성
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          
          # 💡 Flutter 기본 구조가 인식하는 key.properties 생성
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      - name: 🚀 AAB 빌드 실행 (Flutter 기본 서명 로직 사용)
        # 💡 추가 설정 없이 flutter build가 key.properties를 자동으로 읽습니다.
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
