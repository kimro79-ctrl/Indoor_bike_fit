name: BikeFit Final Victory - The Masterpiece

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (깨끗한 상태에서 시작)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 진짜 Keystore 복원 (75:CD...)
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 모바일 복사 오류 방지
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          
          # 💡 [방어] 파일이 없으면 빌드 즉시 중단
          if [ ! -s android/app/release.jks ]; then
            echo "❌ ERROR: Keystore 복원 실패!"
            exit 1
          fi

      - name: 🔧 Gradle 서명 설정 정밀 주입 (1위 방식)
        # 💡 [핵심] plugins 블록 위치를 찾아 그 바로 뒤에 서명 로직을 삽입합니다.
        # 블록 중복 충돌을 방지하기 위해 정교하게 설계되었습니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF
          
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: lines = f.readlines()
          
          # 사용자님이 분석한 최적의 삽입 코드
          signing_code = '''
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          '''
          
          with open(path, 'w') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  # plugins 블록이 끝나는 지점을 찾아 코드 삽입
                  if 'plugins {' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
          "

      - name: 🚀 AAB 빌드 실행 (순정 Release)
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 확인] SHA1 지문 대조
        # 💡 여기서 75:CD...가 나오면 모든 상황 종료입니다.
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
