name: BikeFit PEM Key Generator

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate password-protected private key
        run: |
          openssl genrsa -aes256 -passout pass:BikeFit@2026 -out private_key.pem 2048

      - name: Create certificate (PEM)
        run: |
          openssl req -new -x509 \
          -key private_key.pem \
          -passin pass:BikeFit@2026 \
          -out certificate.pem \
          -days 3650 \
          -subj "/C=KR/ST=Chungbuk/L=Cheongju/O=BikeFit/OU=Mobile/CN=OverTheBikeFit"

      - name: Extract public key
        run: |
          openssl x509 -in certificate.pem -pubkey -noout > public_key.pem

      - name: Show SHA1 fingerprint
        run: |
          openssl x509 -in certificate.pem -noout -fingerprint -sha1

      - name: Upload PEM files
        uses: actions/upload-artifact@v4
        with:
          name: bikefit_pem_keys
          path: |
            private_key.pem
            certificate.pem
            public_key.pem
