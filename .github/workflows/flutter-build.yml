name: Generate and Download PEM File

on:
  workflow_dispatch: # 모바일에서 'Run workflow' 버튼 클릭

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 새 키 및 PEM 파일 생성
        run: |
          # 1. 중복 방지를 위한 완전 새 키 생성
          keytool -genkey -v -keystore final-upload-key.jks \
            -alias bikefit-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "password123" \
            -keypass "password123" \
            -dname "CN=BikeFit, O=Dev, C=KR"

          # 2. 구글 제출용 PEM 인증서 파일 추출
          keytool -export -rfc -keystore final-upload-key.jks -alias bikefit-key -file upload_certificate.pem -storepass "password123"
          
          # 3. GitHub Secret용 Base64 값을 텍스트 파일로 저장 (참고용)
          base64 -w 0 final-upload-key.jks > b64_key.txt

      - name: 📦 파일 다운로드 링크 만들기
        uses: actions/upload-artifact@v4
        with:
          name: Google_Play_Submit_This # 이 이름의 압축파일이 생깁니다
          path: |
            upload_certificate.pem
            b64_key.txt

      - name: 🔍 로그에 정보 출력 (확인용)
        run: |
          echo "===================================================="
          echo "ALIAS: bikefit-key"
          echo "PASSWORD: password123"
          echo "===================================================="
