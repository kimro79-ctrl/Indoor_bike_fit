name: 🔍 [검증] Keystore 실체 확인 (SHA1 & Alias)

on:
  workflow_dispatch:

jobs:
  check-key:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Keystore 파일 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          # Secret 데이터를 파일로 복원합니다.
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > release.jks
          
          if [ ! -s release.jks ]; then
            echo "❌ 오류: Secret(RELEASE_KEYSTORE) 데이터가 비어있습니다."
            exit 1
          fi

      - name: 🕵️ Keystore 실체 확인 (지문 및 별칭)
        # 💡 이 단계의 로그를 펼쳐서 '별칭 이름'과 'SHA1'을 확인하세요.
        run: |
          echo "=================================================="
          echo "1. Keystore 내부 상세 정보 (별칭 및 지문):"
          keytool -list -v -keystore release.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }}
          
          echo ""
          echo "2. 구글 플레이 요구 지문 (대조용):"
          echo "SHA1: 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          echo "=================================================="

      - name: 🎯 결과 분석 가이드
        run: |
          echo "로그를 확인하신 후 다음을 체크하세요:"
          echo "① 별칭 이름(Alias name)이 'fresh-upload-key'와 정확히 일치합니까?"
          echo "② SHA1 지문이 '75:CD:32:95...'로 시작합니까?"
