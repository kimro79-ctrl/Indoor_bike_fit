name: BikeFit PlayStore Release - Final Victory

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          # 바이너리에서 확인된 실제 별칭 주입
          keyAlias=${{ secrets.KEY_ALIAS || 'upload-key' }}
          storeFile=release.jks
          EOF

      - name: ⚙️ Gradle 서명 설정 주입 (Python 방식)
        run: |
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r', encoding='utf-8') as f: lines = f.readlines()
          signing_code = \"\"\"
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          android {
              signingConfigs { release {
                  keyAlias keystoreProperties['keyAlias']
                  keyPassword keystoreProperties['keyPassword']
                  storeFile file(keystoreProperties['storeFile'])
                  storePassword keystoreProperties['storePassword']
              } }
              buildTypes { release { signingConfig signingConfigs.release } }
          }
          \"\"\"
          with open(path, 'w', encoding='utf-8') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  if '}' in line and not inserted:
                      f.write(signing_code); inserted = True
          "

      - name: 🔍 [검증] Keystore 지문 확인
        # 에러가 나도 빌드가 중단되지 않게 하여 지문을 눈으로 확인합니다.
        run: |
          keytool -list -v -keystore android/app/release.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} || true

      - name: 🏗 AAB 빌드
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 대조] 빌드된 AAB SHA1 확인
        run: |
          echo "구글 요구 지문: 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          echo -n "실제 빌드 지문: "
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 결과물 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Production_AAB
          path: build/app/outputs/bundle/release/app-release.aab
