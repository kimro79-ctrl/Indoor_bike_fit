name: BikeFit Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify keystore file
        run: |
          echo "Checking keystore file in repository..."
          ls -la android/app/release.jks
          if [ ! -f android/app/release.jks ]; then
            echo "ERROR: release.jks not found. Please upload it to android/app/"
            exit 1
          fi

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release --no-pub

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit-AAB
          path: build/app/outputs/bundle/release/app-release.aab
