name: BikeFit Final Victory - Perfect Signing & Audit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 진짜 Keystore 복원 및 1차 검증
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 모바일 복사 시 발생하는 줄바꿈 제거 후 복원
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          
          # 파일이 비어있으면 즉시 실패 처리
          if [ ! -s android/app/release.jks ]; then
            echo "❌ ERROR: Keystore file is empty or missing!"
            exit 1
          fi

      - name: 🕵️ [중요] 사용 중인 키의 진짜 SHA1 확인
        # 💡 빌드 전, Secret에 저장된 키가 구글용(75:CD...)인지 로그에서 바로 확인합니다.
        run: |
          echo "검사 대상 키 별칭: fresh-upload-key"
          keytool -list -v -keystore android/app/release.jks \
            -alias fresh-upload-key \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA1

      - name: 🔧 Gradle 서명 설정 정밀 주입 (문법 오류 방지)
        # 💡 plugins { } 블록이 닫히는 지점을 찾아 그 뒤에 삽입하여 Gradle 에러를 방지합니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF
          
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: lines = f.readlines()
          
          signing_code = '''
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          '''
          
          with open(path, 'w') as f:
              in_plugins = False
              inserted = False
              for line in lines:
                  f.write(line)
                  if 'plugins {' in line: in_plugins = True
                  if in_plugins and '}' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
                      in_plugins = False
          "

      - name: 🚀 AAB 빌드 실행
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 확인] 빌드된 AAB 지문 대조
        # 💡 결과물 지문이 75:CD...인지 마지막으로 확인합니다.
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
