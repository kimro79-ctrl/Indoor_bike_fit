def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.overthebike.over_the_bike_fit"
    // 최신 SDK 대응
    compileSdk 35

    // ✅ 16KB 페이지 지원을 위해 NDK 버전 명시 (24.0.7508024 이상 필요)
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.overthebike.over_the_bike_fit"
        minSdk 21
        targetSdk 35
        versionCode 1706
        versionName "1.0.1"

        // ✅ 16KB 메모리 페이지 지원을 위한 빌드 플래그 추가
        externalNativeBuild {
            cmake {
                cppFlags "-Wl,-z,max-page-size=16384"
            }
            ndkBuild {
                arguments "APP_LDFLAGS+=-Wl,-z,max-page-size=16384"
            }
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}
