name: BikeFit Final Success - Mobile Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 및 Flutter 설정 (3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: 🐦 Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ Android 프로젝트 리셋
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원 및 검증
        # 💡 환경 변수를 통해 데이터를 안전하게 전달합니다.
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          
          # 💡 파일이 비어있는지 모바일에서도 로그로 확인할 수 있게 합니다.
          if [ ! -s android/app/release.jks ]; then
            echo "❌ ERROR: Keystore file is 0 bytes. Check your Secret data!"
            exit 1
          fi
          ls -lh android/app/release.jks

      - name: 🔧 서명 정보 주입 (fresh-upload-key)
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      - name: 🛠️ build.gradle 강제 개조
        run: |
          FILE=android/app/build.gradle
          sed -i '1i import java.util.Properties\nimport java.io.FileInputStream' $FILE
          sed -i '/android {/i def keystoreProperties = new Properties()\ndef keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) {\n    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n}\n' $FILE
          sed -i '/signingConfigs {/a \        release {\n            keyAlias keystoreProperties["keyAlias"]\n            keyPassword keystoreProperties["keyPassword"]\n            storeFile file(keystoreProperties["storeFile"])\n            storePassword keystoreProperties["storePassword"]\n        }' $FILE
          # debug/release 모두 release 서명(75:CD...)을 쓰도록 강제
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' $FILE
          sed -i '/buildTypes {/,/}/ s/signingConfig.*/signingConfig signingConfigs.release/' $FILE

      - name: 🚀 AAB 빌드 실행
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 📦 파일 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
