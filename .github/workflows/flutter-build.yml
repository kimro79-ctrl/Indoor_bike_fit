name: BikeFit PlayStore Release Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1


      - name: Install Dependencies
        run: flutter pub get


      - name: Restore Keystore
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n\r ' | base64 -d > android/app/release.jks
          echo "=== keystore restored ==="
          ls -lh android/app


      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF


      - name: Verify Keystore SHA1
        run: |
          echo "=== EXPECTED SHA1 ==="
          keytool -list -v \
          -keystore android/app/release.jks \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          -alias ${{ secrets.KEY_ALIAS }} | grep SHA1


      - name: Build AAB
        run: flutter build appbundle --release --build-number=1004


      - name: Verify AAB Signature
        run: |
          echo "=== AAB SHA1 ==="
          keytool -printcert \
          -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit-AAB
          path: build/app/outputs/bundle/release/app-release.aab
