name: BikeFit Final Victory - Sodomaki80 Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 및 Flutter 환경 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성 (절대 경로 및 Sodomaki80 적용)
        # Gradle이 어떤 상황에서도 파일을 찾을 수 있도록 절대 경로를 사용합니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=/home/runner/work/Over_the_bike_fit/Over_the_bike_fit/android/app/release.jks
          EOF

      - name: 🔍 [선행 검증] Sodomaki80 비밀번호 및 지문 확인
        # 빌드 전 키가 제대로 열리는지, 지문이 75:CD...인지 1초 만에 확인합니다.
        run: |
          echo "=================================================="
          echo "목표(Google): 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          keytool -list -v -keystore android/app/release.jks -alias fresh-upload-key -storepass Sodomaki80 -keypass Sodomaki80 | grep SHA1
          echo "=================================================="

      - name: 📑 [결정적 단계] build.gradle 직접 작성 (V2 정석 코드)
        # build.gradle 내부의 변수 깨짐을 방지하기 위해 'EOF'를 사용합니다.
        run: |
          cat <<'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('../key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 35

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 35
                  versionCode 1700
                  versionName "1.0.0"
              }

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF

      - name: 🏗 AAB 빌드 실행 (Sodomaki80 서명 적용)
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 확인] 결과물 AAB 지문 재검증
        run: |
          echo "=================================================="
          echo "최종 생성된 AAB의 지문이 75:CD... 인지 확인합니다:"
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1
          echo "=================================================="

      - name: 📦 승리의 AAB 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Sodomaki80_AAB
          path: build/app/outputs/bundle/release/app-release.aab
