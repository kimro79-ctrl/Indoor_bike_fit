name: BikeFit PlayStore Release - 0220 Fixed Victory

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # Secrets에 저장된 jks 파일을 바이너리로 복원합니다.
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성 (2월 20일 키 강제 고정)
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          # 2월 20일에 우리가 만든 진짜 별칭입니다.
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      - name: ⚙️ Gradle 서명 설정 주입
        run: |
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r', encoding='utf-8') as f: lines = f.readlines()
          signing_code = \"\"\"
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          android {
              signingConfigs { release {
                  keyAlias keystoreProperties['keyAlias']
                  keyPassword keystoreProperties['keyPassword']
                  storeFile file(keystoreProperties['storeFile'])
                  storePassword keystoreProperties['storePassword']
              } }
              buildTypes { release { signingConfig signingConfigs.release } }
          }
          \"\"\"
          with open(path, 'w', encoding='utf-8') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  if '}' in line and not inserted:
                      f.write(signing_code); inserted = True
          "

      - name: 🏗 AAB 빌드 실행 (버전 코드 상향)
        # 구글 콘솔 중복 방지를 위해 빌드 번호를 높였습니다.
        run: flutter build appbundle --release --no-tree-shake-icons --build-number=800

      - name: 🔍 [최종 확인] 빌드된 AAB SHA1 지문 대조
        run: |
          echo "=================================================="
          echo "구글 요구 지문: 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          echo -n "실제 빌드 지문: "
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1
          echo "=================================================="

      - name: 📦 결과물 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_0220_Key_AAB
          path: build/app/outputs/bundle/release/app-release.aab
