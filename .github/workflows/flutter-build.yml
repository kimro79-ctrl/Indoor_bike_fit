name: BikeFit Final Ultra Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: 환경 재생성 (v2 Embedding 강제 적용)
        run: |
          # 1. 기존 안드로이드 폴더 완전 삭제 및 재생성
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get
          
          # 2. AndroidManifest 설정 (블루투스 권한 및 v2 embedding)
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.overthebike.over_the_bike_fit">
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <application android:label="Indoor_fit_app" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF
          
          # 3. MultiDex 활성화
          sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle

      - name: 진짜 키스토어 배치 및 서명 설정
        run: |
          # [span_3](start_span)리포지토리에 올리신 진짜 release.jks를 빌드 경로로 복사[span_3](end_span)
          cp android/app/release.jks ./release.jks || echo "이미 루트에 있음"
          
          # [span_4](start_span)key.properties 작성 (사용자님 파일의 별칭 'upload-key' 적용)[span_4](end_span)
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=upload-key
          storeFile=../release.jks
          EOF

      - name: Build Release AAB
        run: |
          flutter clean
          flutter pub get
          # 이제 진짜 키로 도장이 찍힙니다.
          flutter build appbundle --release --no-tree-shake-icons

      - name: Upload Final AAB
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_Success
          path: build/app/outputs/bundle/release/app-release.aab
