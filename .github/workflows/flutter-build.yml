name: BikeFit UI Fix - Victory Run (Auto Versioning)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4 

      - name: ☕ Java 및 Flutter 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1 

      - name: 🔢 빌드 번호 계산
        run: |
          BASE_CODE=1706
          NEW_CODE=$((BASE_CODE + ${{ github.run_number }}))
          echo "FINAL_VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV

      # ❌ flutter_launcher_icons 제거 (자동생성 금지)
      # ❌ 아이콘 덮어쓰기 문제 방지

      - name: 🧹 클린
        run: |
          flutter clean
          flutter pub get

      # 🔥 여기서 아이콘 강제 덮어쓰기
      - name: 🎯 아이콘 강제 적용
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp assets/icon/app_icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/icon/app_icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/icon/app_icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/icon/app_icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/icon/app_icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: 📝 AndroidManifest 고정
        run: |
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.overthebike.over_the_bike_fit">

              <application
                  android:label="Indoor bike fit"
                  android:icon="@mipmap/ic_launcher">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

      - name: 🏗️ AAB 빌드
        run: flutter build appbundle --release

      - name: 📦 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_AAB
          path: build/app/outputs/bundle/release/app-release.aab
